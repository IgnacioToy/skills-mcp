name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check (bash -n)
        run: |
          errors=0
          for script in *; do
            [ -f "$script" ] || continue
            head -1 "$script" | grep -q '^#!/.*bash' || continue
            if ! bash -n "$script" 2>&1; then
              echo "::error file=$script::Syntax error in $script"
              errors=$((errors + 1))
            fi
          done
          # Also check lib/common.sh
          if [ -f lib/common.sh ]; then
            bash -n lib/common.sh || { echo "::error file=lib/common.sh::Syntax error"; errors=$((errors + 1)); }
          fi
          [ "$errors" -eq 0 ] || { echo "::error::$errors script(s) have syntax errors"; exit 1; }
      - name: Run ShellCheck
        run: |
          errors=0
          for script in *; do
            [ -f "$script" ] || continue
            # Detect bash scripts by their shebang
            head -1 "$script" | grep -q '^#!/.*bash' || continue
            echo "::group::$script"
            # Fail on warning+ only; info/style findings don't block CI.
            shellcheck -x --severity=warning "$script" || errors=$((errors + 1))
            echo "::endgroup::"
          done
          # Also check lib/common.sh
          if [ -f lib/common.sh ]; then
            echo "::group::lib/common.sh"
            shellcheck -x --severity=warning lib/common.sh || errors=$((errors + 1))
            echo "::endgroup::"
          fi
          [ "$errors" -eq 0 ] || { echo "::error::$errors script(s) failed ShellCheck"; exit 1; }

  pssa:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $scripts = Get-ChildItem -Path . -Filter '*.ps1' | Where-Object { $_.Name -ne 'install.ps1' }
          $errors = 0
          foreach ($s in $scripts) {
            Write-Host "::group::$($s.Name)"
            # Annotate warnings and errors, but only fail CI on errors.
            $result = Invoke-ScriptAnalyzer -Path $s.FullName -Severity Error,Warning
            foreach ($r in $result) {
              $level = if ($r.Severity -eq 'Error') { 'error' } else { 'warning' }
              Write-Host "::$level file=$($s.Name),line=$($r.Line)::$($r.RuleName): $($r.Message)"
            }
            if ($result | Where-Object { $_.Severity -eq 'Error' }) { $errors++ }
            Write-Host "::endgroup::"
          }
          if ($errors -gt 0) { Write-Error "$errors script(s) have analyzer errors"; exit 1 }
          Write-Host "All PS1 scripts passed (warnings shown as annotations)."
